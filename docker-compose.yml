version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: copilot-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=taskmanager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  backend:
    build: .
    container_name: copilot-backend
    ports:
      - "3000:3000"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=taskmanager
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=your_jwt_secret_key_here_change_in_production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres-data:
